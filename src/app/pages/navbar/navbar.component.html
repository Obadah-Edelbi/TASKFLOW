<nav class="navbar" *ngIf="isLoggedIn">
  <div class="app-container navbar-container">
    <!-- LEFT -->
    <div class="left-section">
      <!-- LOGO -->
      <div class="logo" (click)="setActiveTab('Tasks', '/dashboard/tasks')">
        <div class="logo-icon">
          <mat-icon>task_alt</mat-icon>
        </div>
        <span>TaskFlow</span>
      </div>

      <!-- LINKS -->
      <div class="nav-links">
        <button
          *ngFor="let link of visibleNavLinks"
          class="nav-btn"
          [class.active]="activeTab === link.name"
          (click)="setActiveTab(link.name, link.route)"
        >
          <mat-icon>{{ link.icon }}</mat-icon>
          {{ link.name }}
        </button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-section">
      <!-- 🌙 THEME -->
      <button
        class="theme-btn"
        (click)="toggleTheme()"
        [ngClass]="isDarkMode ? 'dark-btn' : 'light-btn'"
      >
        <mat-icon *ngIf="isDarkMode">light_mode</mat-icon>
        <mat-icon *ngIf="!isDarkMode">dark_mode</mat-icon>
      </button>

      <div class="divider"></div>

      <!-- 🔔 NOTIFICATIONS -->
      <div class="notif">
        <button class="icon-btn" (click)="toggleDropdown($event)">
          <mat-icon>notifications</mat-icon>

          <span class="badge" *ngIf="unreadCount > 0">
            {{ unreadCount }}
          </span>
        </button>

        <!-- DROPDOWN -->
        <div class="notif-dropdown" *ngIf="showDropdown">
          <div class="notif-header">
            <span>Notifications</span>
            <button (click)="clearAll()">Clear all</button>
          </div>

          <div class="notif-list">
            <div
              class="notif-item"
              *ngFor="let n of notifications; let i = index"
              (click)="markOneAsRead(i)"
            >
              <div class="message">{{ n.message }}</div>
              <div class="time">{{ timeAgo(n.createdAt) }}</div>
            </div>

            <!-- EMPTY -->
            <div class="empty" *ngIf="notifications.length === 0">
              No notifications
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 👤 USER -->
      <!-- 👤 USER -->
      <div class="user" (click)="toggleUserMenu($event)">
        <!-- AVATAR -->
        <div class="avatar">
          <img
            *ngIf="user?.image && !imageError"
            [src]="user.image"
            (error)="imageError = true"
          />

          <span *ngIf="!user?.image || imageError">
            {{ user?.name?.charAt(0) }}
          </span>
        </div>

        <!-- INFO -->
        <div class="user-info">
          <span class="name">{{ user?.name }}</span>

          <div class="role-row">
            <mat-icon class="role-icon" *ngIf="isAdmin">
              admin_panel_settings
            </mat-icon>

            <mat-icon class="role-icon" *ngIf="!isAdmin"> person </mat-icon>

            <span class="role-text">
              {{ isAdmin ? "Admin" : "User" }}
            </span>
          </div>
        </div>

        <!-- ARROW -->
        <mat-icon class="arrow">expand_more</mat-icon>

        <!-- DROPDOWN (UNCHANGED) -->
        <div class="user-dropdown" *ngIf="showUserMenu">
          <button
            (click)="
              setActiveTab('Profile', '/dashboard/profile');
              showUserMenu = false
            "
          >
            <mat-icon>person</mat-icon>
            Profile
          </button>

          <button
            (click)="
              setActiveTab('Settings', '/dashboard/settings');
              showUserMenu = false
            "
          >
            <mat-icon>settings</mat-icon>
            Settings
          </button>

          <div class="divider"></div>

          <button class="logout" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
