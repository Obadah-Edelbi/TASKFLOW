<mat-card class="card" *ngIf="!loading && task; else stateTpl">
  <div class="top">
    <button mat-button routerLink="/dashboard/tasks">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>

    <span class="spacer"></span>

    <button
      mat-raised-button
      color="primary"
      [routerLink]="['/dashboard/tasks', task._id, 'edit']"
    >
      <mat-icon>edit</mat-icon>
      Edit
    </button>
  </div>

  <h2 class="title">{{ task.title }}</h2>

  <div class="meta">
    <span class="pill">Status: {{ task.status }}</span>
    <span class="pill">Priority: {{ task.priority }}</span>

    <span class="pill" *ngIf="task.createdAt">
      Created: {{ task.createdAt | date : "dd/MM/yy, h:mm a" }}
    </span>
  </div>

  <div class="desc">
    <h3>Description</h3>
    <p>{{ task.description || "No description" }}</p>
  </div>
</mat-card>

<ng-template #stateTpl>
  <mat-card class="card">
    <p *ngIf="loading">Loading...</p>
    <p *ngIf="!loading">No task found</p>
  </mat-card>
</ng-template>
