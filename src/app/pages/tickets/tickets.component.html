<h2>Tasks</h2>

<mat-form-field appearance="outline" style="width: 320px; margin-bottom: 12px">
  <mat-label>Search</mat-label>
  <input
    matInput
    (input)="applyFilter($any($event.target).value)"
    placeholder="title, status..."
  />
</mat-form-field>

<div *ngIf="loading">Loading...</div>

<table
  mat-table
  [dataSource]="dataSource"
  *ngIf="!loading"
  class="mat-elevation-z2"
  style="width: 100%"
>
  <!-- Title -->
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Title</th>
    <td mat-cell *matCellDef="let t">{{ t.title }}</td>
  </ng-container>

  <!-- Status -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let t">{{ t.status }}</td>
  </ng-container>

  <!-- Created -->
  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Created</th>
    <td mat-cell *matCellDef="let t">{{ t.createdAt | date : "short" }}</td>
  </ng-container>

  <!-- Actions -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let t">
      <button mat-icon-button color="primary" (click)="editTask(t)">
        <mat-icon>edit</mat-icon>
      </button>

      <button mat-icon-button color="warn" (click)="deleteTask(t)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<mat-paginator
  [pageSizeOptions]="[5, 10, 20]"
  [pageSize]="10"
  showFirstLastButtons
></mat-paginator>
<div *ngIf="!loading && dataSource.data.length === 0" style="margin-top: 12px">
  No tasks found
</div>
