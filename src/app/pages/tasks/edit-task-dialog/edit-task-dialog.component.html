<p>edit-task-dialog works!</p>
<div class="dialog-wrapper">
  <!-- Header -->
  <div class="dialog-header">
    <h2>Update Task Definition</h2>
    <p>Modify task parameters and workflow state.</p>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="dialog-form">
    <!-- Title -->
    <div class="field">
      <label>Task Objective</label>
      <mat-form-field appearance="outline" class="full-width">
        <input
          matInput
          formControlName="title"
          placeholder="Enter task title"
        />
        <mat-error *ngIf="form.get('title')?.hasError('required')">
          Title is required
        </mat-error>
        <mat-error *ngIf="form.get('title')?.hasError('minlength')">
          Minimum 3 characters required
        </mat-error>
      </mat-form-field>
    </div>

    <!-- Description -->
    <div class="field">
      <label>Description & Scope</label>
      <mat-form-field appearance="outline" class="full-width">
        <textarea
          matInput
          rows="4"
          formControlName="description"
          placeholder="Define the technical scope..."
        ></textarea>
        <mat-error *ngIf="form.get('description')?.hasError('required')">
          Description is required
        </mat-error>
        <mat-error *ngIf="form.get('description')?.hasError('minlength')">
          Minimum 3 characters required
        </mat-error>
      </mat-form-field>
    </div>

    <!-- Priority + Status -->
    <div class="row">
      <div class="field half">
        <label>Priority Level</label>
        <mat-form-field appearance="outline" class="full-width">
          <mat-select formControlName="priority">
            <mat-option value="low">Low</mat-option>
            <mat-option value="medium">Medium</mat-option>
            <mat-option value="high">High</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="field half">
        <label>Current Status</label>
        <mat-form-field appearance="outline" class="full-width">
          <mat-select formControlName="status">
            <mat-option value="new">New</mat-option>
            <mat-option value="in_progress">In Progress</mat-option>
            <mat-option value="resolved">Resolved</mat-option>
            <mat-option value="rejected">Rejected</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Actions -->
    <div class="dialog-actions">
      <button mat-button type="button" (click)="close()">Cancel</button>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="form.invalid"
      >
        Update Task
      </button>
    </div>
  </form>
</div>
