<mat-card>
  <mat-card-title>{{ id ? "Edit Task" : "Create Task" }}</mat-card-title>

  <mat-card-content>
    <form [formGroup]="form" class="form">
      <!-- Title -->
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input
          matInput
          formControlName="title"
          placeholder="Enter task title"
        />
        <mat-error
          *ngIf="form.get('title')?.touched && form.get('title')?.invalid"
        >
          Title is required (min 3 chars)
        </mat-error>
      </mat-form-field>

      <!-- Description -->
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          rows="4"
          formControlName="description"
          placeholder="Enter task description"
        ></textarea>
        <mat-error
          *ngIf="
            form.get('description')?.touched && form.get('description')?.invalid
          "
        >
          Description is required (min 3 chars)
        </mat-error>
      </mat-form-field>

      <!-- Priority -->
      <mat-form-field appearance="outline">
        <mat-label>Priority</mat-label>
        <mat-select formControlName="priority">
          <mat-option value="low">Low</mat-option>
          <mat-option value="medium">Medium</mat-option>
          <mat-option value="high">High</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Status -->
      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option value="new">New</mat-option>
          <mat-option value="in_progress">In Progress</mat-option>
          <mat-option value="resolved">Resolved</mat-option>
          <mat-option value="rejected">Rejected</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button routerLink="/dashboard/tasks">Cancel</button>

    <button
      mat-raised-button
      color="primary"
      (click)="save()"
      [disabled]="loading || form.invalid"
      type="button"
    >
      {{ loading ? "Saving..." : id ? "Update" : "Create" }}
    </button>
  </mat-card-actions>
</mat-card>
